<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofía Lavados - Sistema</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#040a14]">

    <div id="root"></div>

    <script type="text/babel" src="App.jsx"></script>

    <script type="text/babel">
        // Esta función va a revisar cada un instante hasta que App aparezca en memoria
        const iniciarAppSegura = () => {
            if (window.App) {
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(React.createElement(window.App));
                console.log("¡Sistema iniciado con éxito!");
            } else {
                // Si Babel todavía está traduciendo, espera 100 milisegundos y vuelve a intentar
                setTimeout(iniciarAppSegura, 105);
            }
        };

        // Arranca la revisión apenas se monta el esqueleto básico
        window.addEventListener('DOMContentLoaded', iniciarAppSegura);
    </script>
</body>
</html>
