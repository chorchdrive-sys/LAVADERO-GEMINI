<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofía Lavados - Sistema</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#040a14]">

    <div id="root"></div>

    <script type="text/babel" src="App.jsx"></script>

    <script type="text/babel">
        window.addEventListener('load', () => {
            // Le damos una milésima de segundo a Babel para asegurar que inyectó App en el window global
            setTimeout(() => {
                if (window.App) {
                    const root = ReactDOM.createRoot(document.getElementById('root'));
                    root.render(React.createElement(window.App));
                } else {
                    console.error("No se pudo encontrar el componente App en el entorno global. Verificá si App.jsx tiene errores de sintaxis.");
                }
            }, 50);
        });
    </script>
</body>
</html>
