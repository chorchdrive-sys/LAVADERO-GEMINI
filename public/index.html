<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFÍA LAVADOS - Sistema Total</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #040a14; color: #e2e8f0; font-family: system-ui; }
        .glass { background: #0b1220; border: 1px solid #1e293b; }
        .tab-active { color: #22d3ee; border-bottom: 2px solid #22d3ee; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const fbConfig = {
            apiKey: "AIzaSyDBZS7KR8YIq8UzAhnq9WaPTh8wGTZ-SMI",
            projectId: "sofia-lavados-99231",
            storageBucket: "sofia-lavados-99231.firebasestorage.app",
            appId: "1:738758410354:web:0c07ee6f2906d8add402eb"
        };
        firebase.initializeApp(fbConfig);
        const db = firebase.firestore();

        function App() {
            const [tab, setTab] = React.useState('monitor');
            const [turnos, setTurnos] = React.useState([]);
            const [staff, setStaff] = React.useState([]);

            React.useEffect(() => {
                db.collection("turnos").onSnapshot(s => setTurnos(s.docs.map(d => ({id: d.id, ...d.data()}))));
                db.collection("staff").onSnapshot(s => setStaff(s.docs.map(d => ({id: d.id, ...d.data()}))));
            }, []);

            const renderContent = () => {
                switch(tab) {
                    case 'monitor': return (
                        <div className="space-y-3">
                            {turnos.map(t => (
                                <div key={t.id} className="glass p-4 rounded-lg">
                                    <div className="flex justify-between font-bold text-sm text-cyan-400">{t.clienteNombre}</div>
                                    <div className="text-xs text-slate-400">{t.direccion}</div>
                                    <div className="mt-2 text-xs font-mono">${t.precio} | {t.estadoPago || 'Pendiente'}</div>
                                </div>
                            ))}
                        </div>
                    );
                    case 'caja': return (
                        <div className="glass p-6 rounded-lg text-center">
                            <h2 className="text-xl font-black mb-4">CIERRE DEL DÍA</h2>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="p-4 glass rounded">Total Efectivo: ${turnos.filter(t=>t.metodo==='efectivo').reduce((a,b)=>a+(b.precio||0),0)}</div>
                                <div className="p-4 glass rounded">Total MP: ${turnos.filter(t=>t.metodo==='mp').reduce((a,b)=>a+(b.precio||0),0)}</div>
                            </div>
                        </div>
                    );
                    case 'staff': return (
                        <div className="space-y-2">
                            {staff.map(s => (
                                <div key={s.id} className="glass p-3 flex justify-between items-center rounded">
                                    <span>{s.nombre}</span>
                                    <span className="text-cyan-400 font-bold">${s.saldoPendiente || 0}</span>
                                </div>
                            ))}
                        </div>
                    );
                    default: return <div className="text-center">Seleccioná una opción</div>;
                }
            };

            return (
                <div className="flex flex-col h-screen">
                    <header className="p-4 border-b border-slate-800 bg-[#0b1220]">
                        <h1 className="text-xl font-black text-white">SOFÍA<span className="text-cyan-500">LAVADOS</span></h1>
                    </header>
                    <main className="flex-1 overflow-y-auto p-4">{renderContent()}</main>
                    <nav className="glass border-t p-4 flex justify-between text-[10px] font-bold uppercase">
                        {['monitor', 'agenda', 'caja', 'staff'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={tab === t ? 'tab-active' : 'text-slate-500'}>{t}</button>
                        ))}
                    </nav>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
