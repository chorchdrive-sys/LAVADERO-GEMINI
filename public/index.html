<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOFÍA LAVADOS - Gestión Integral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#040a14] text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        // CONFIGURACIÓN FIREBASE
        const FB = {
            apiKey: "AIzaSyDBZS7KR8YIq8UzAhnq9WaPTh8wGTZ-SMI",
            authDomain: "sofia-lavados-99231.firebaseapp.com",
            projectId: "sofia-lavados-99231",
            storageBucket: "sofia-lavados-99231.firebasestorage.app",
            messagingSenderId: "738758410354",
            appId: "1:738758410354:web:0c07ee6f2906d8add402eb"
        };
        firebase.initializeApp(FB);
        const db = firebase.firestore();

        // CONSTANTES
        const BASE_LAT = -34.5128; 
        const BASE_LNG = -58.4985;
        const FRANJAS = ["09:00", "10:30", "12:00", "13:30", "15:00", "16:30", "18:00"];
        const TAMANOS = [
            { id: "chico", label: "Chico", precio: 25000 },
            { id: "mediano", label: "Mediano", precio: 28000 },
            { id: "camioneta", label: "Camioneta", precio: 32000 }
        ];

        const STAFF_SEED = [
            { id: "s1", nombre: "Jhony", transporte: "moto", color: "#22d3ee" },
            { id: "s2", nombre: "Sergio", transporte: "moto", color: "#ea5e9" },
            { id: "s3", nombre: "Alexander", transporte: "moto", color: "#38bdf8" },
            { id: "s4", nombre: "Maxi", transporte: "moto", color: "#7dd3fc" },
            { id: "s5", nombre: "Rene", transporte: "moto", color: "#06b6d4" },
            { id: "s6", nombre: "Bruno", transporte: "bici", color: "#a78bfa" },
            { id: "s7", nombre: "Hernán", transporte: "bici", color: "#f87171" }
        ];

        // HELPERS
        const obtenerHoy = () => new Date().toISOString().split('T')[0];
        const formatP = n => "$" + Number(n || 0).toLocaleString("es-AR");

        function App() {
            const [tab, setTab] = React.useState("turnos");
            const [staff, setStaff] = React.useState([]);
            const [turnos, setTurnos] = React.useState([]);
            const [jornada, setJornada] = React.useState({ estado: 'cerrado', retenidos: [] });
            
            // Estados para Formulario
            const [form, setForm] = React.useState({ cliente: '', direccion: '', barrio: 'Olivos', franja: '09:00', tamano: 'mediano', lavador: '', metodo: 'efectivo' });
            const [buscandoGps, setBuscandoGps] = React.useState(false);

            // Modales
            const [modalCobro, setModalCobro] = React.useState(null);
            const [modalVale, setModalVale] = React.useState(null);

            React.useEffect(() => {
                const unsubStaff = db.collection("staff").onSnapshot(snap => {
                    if (snap.empty) STAFF_SEED.forEach(s => db.collection("staff").add(s));
                    else setStaff(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubTurnos = db.collection("turnos").onSnapshot(snap => {
                    setTurnos(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubConfig = db.collection("config").doc("jornada").onSnapshot(doc => {
                    if (doc.exists) setJornada(doc.data());
                });
                return () => { unsubStaff(); unsubTurnos(); unsubConfig(); };
            }, []);

            // Lógica de Semáforo y Guardado
            const guardarTurno = async () => {
                if (!form.cliente || !form.direccion || !form.lavador) return alert("Faltan datos");
                setBuscandoGps(true);
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(form.direccion + ", " + form.barrio + ", Buenos Aires")}`);
                    const data = await res.json();
                    let lat = BASE_LAT, lng = BASE_LNG, cuadras = 0;
                    
                    if (data[0]) {
                        lat = parseFloat(data[0].lat);
                        lng = parseFloat(data[0].lon);
                        const dist = Math.sqrt(Math.pow(lat - BASE_LAT, 2) + Math.pow(lng - BASE_LNG, 2)) * 111;
                        cuadras = Math.round(dist * 10);
                    }

                    const lav = staff.find(s => s.id === form.lavador);
                    const precioBase = TAMANOS.find(t => t.id === form.tamano).precio;
                    let recargo = 0, semaforo = "OK";

                    if (lav.transporte === "moto" && cuadras > 30) { recargo = 0.2; semaforo = "FZ"; }
                    if (lav.transporte === "bici" && cuadras > 15) { recargo = 0.2; semaforo = "FZ"; }

                    await db.collection("turnos").add({
                        ...form,
                        lavadorNombre: lav.nombre,
                        precio: precioBase * (1 + recargo),
                        cuadras,
                        semaforo,
                        lat, lng,
                        fecha: obtenerHoy(),
                        estadoPago: 'Pendiente'
                    });
                    setForm({ ...form, cliente: '', direccion: '' });
                } catch (e) { console.error(e); }
                setBuscandoGps(false);
            };

            // Rendición de Jorge (La más compleja)
            const ejecutarRendicion = async (importeReal, propina, destino) => {
                const dif = importeReal - modalCobro.precio;
                await db.collection("turnos").doc(modalCobro.id).update({
                    estadoPago: destino === 'deuda' ? 'Cliente Debe' : 'Cobrado',
                    montoPagado: importeReal,
                    diferencia: dif,
                    propina: propina,
                    fechaCobro: obtenerHoy()
                });
                setModalCobro(null);
            };

            // Cálculos para la tabla de Jorge
            const liquidacionJorge = () => {
                const resumen = {};
                staff.forEach(s => resumen[s.id] = { nombre: s.nombre, comisiones: 0, efectivoMano: 0, vales: 0 });
                
                turnos.filter(t => t.fecha === obtenerHoy()).forEach(t => {
                    if (resumen[t.lavador]) {
                        const comision = t.precio * 0.5;
                        resumen[t.lavador].comisiones += comision;
                        if (t.metodo === 'efectivo' && t.estadoPago === 'Cobrado') {
                            resumen[t.lavador].efectivoMano += t.montoPagado;
                        }
                    }
                });
                return Object.values(resumen);
            };

            return (
                <div className="max-w-5xl mx-auto p-4">
                    {/* CABECERA */}
                    <div className="flex justify-between items-center border-b border-slate-800 pb-4 mb-6">
                        <div>
                            <h1 className="text-2xl font-black text-cyan-400">SOFÍA LAVADOS v5.0</h1>
                            <p class="text-xs text-slate-500 font-mono">ACCOUNTING & LOGISTICS SYSTEM</p>
                        </div>
                        <button 
                            onClick={() => db.collection("config").doc("jornada").set({ estado: jornada.estado === 'abierto' ? 'cerrado' : 'abierto' }, {merge: true})}
                            className={`px-4 py-2 rounded-full text-xs font-bold transition ${jornada.estado === 'abierto' ? 'bg-rose-500/20 text-rose-500 border border-rose-500/50' : 'bg-emerald-500 text-white'}`}
                        >
                            {jornada.estado === 'abierto' ? 'CERRAR JORNADA' : 'ABRIR JORNADA'}
                        </button>
                    </div>

                    {/* TABS */}
                    <div className="flex gap-4 mb-6 border-b border-slate-900 pb-2">
                        <button onClick={() => setTab("turnos")} className={`pb-2 px-2 text-sm font-bold ${tab === 'turnos' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-500'}`}>DIARIO</button>
                        <button onClick={() => setTab("cierre")} className={`pb-2 px-2 text-sm font-bold ${tab === 'cierre' ? 'text-cyan-400 border-b-2 border-cyan-400' : 'text-slate-500'}`}>CIERRE JORGE</button>
                    </div>

                    {tab === "turnos" && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* FORMULARIO */}
                            <div className="bg-[#0b1220] p-5 rounded-2xl border border-slate-800 h-fit">
                                <h2 className="text-xs font-bold text-slate-500 uppercase mb-4 tracking-widest">Nuevo Servicio</h2>
                                <div className="space-y-3">
                                    <input placeholder="Nombre Cliente" className="w-full bg-[#040a14] p-3 rounded-xl border border-slate-800 text-sm outline-none" value={form.cliente} onChange={e => setForm({...form, cliente: e.target.value})} />
                                    <input placeholder="Dirección" className="w-full bg-[#040a14] p-3 rounded-xl border border-slate-800 text-sm outline-none" value={form.direccion} onChange={e => setForm({...form, direccion: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <select className="bg-[#040a14] p-3 rounded-xl border border-slate-800 text-xs" value={form.barrio} onChange={e => setForm({...form, barrio: e.target.value})}>
                                            <option>Olivos</option><option>Martínez</option><option>Florida</option><option>San Isidro</option>
                                        </select>
                                        <select className="bg-[#040a14] p-3 rounded-xl border border-slate-800 text-xs" value={form.franja} onChange={e => setForm({...form, franja: e.target.value})}>
                                            {FRANJAS.map(f => <option key={f}>{f}</option>)}
                                        </select>
                                    </div>
                                    <select className="w-full bg-[#040a14] p-3 rounded-xl border border-slate-800 text-xs" value={form.lavador} onChange={e => setForm({...form, lavador: e.target.value})}>
                                        <option value="">Seleccionar Lavador</option>
                                        {staff.map(s => <option key={s.id} value={s.id}>{s.nombre} ({s.transporte})</option>)}
                                    </select>
                                    <button disabled={buscandoGps} onClick={guardarTurno} className="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold p-3 rounded-xl text-xs transition">
                                        {buscandoGps ? "VALIDANDO..." : "AGENDAR TURNO"}
                                    </button>
                                </div>
                            </div>

                            {/* MONITOR */}
                            <div className="lg:col-span-2 space-y-3">
                                {turnos.filter(t => t.fecha === obtenerHoy()).sort((a,b) => a.franja.localeCompare(b.franja)).map(t => (
                                    <div key={t.id} className="bg-[#0b1220] p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                                        <div className="flex items-center gap-4">
                                            <div className="text-center bg-[#040a14] p-2 rounded-xl border border-slate-800 min-w-[60px]">
                                                <div className="text-xs font-black text-cyan-400">{t.franja}</div>
                                                <div className="text-[10px] text-slate-500 font-bold">{t.barrio.substring(0,3).toUpperCase()}</div>
                                            </div>
                                            <div>
                                                <div className="text-sm font-bold">{t.cliente} <span className="text-[10px] bg-slate-800 px-2 py-0.5 rounded-full text-slate-400">{t.tamano}</span></div>
                                                <div className="text-xs text-slate-500">{t.direccion}</div>
                                                <div className="flex items-center gap-2 mt-1">
                                                    <span className={`w-2 h-2 rounded-full ${t.semaforo === 'FZ' ? 'bg-rose-500' : 'bg-emerald-500'}`}></span>
                                                    <span className="text-[10px] font-bold text-slate-400">{t.lavadorNombre} • {t.cuadras} cuadras</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-sm font-black text-white">{formatP(t.precio)}</div>
                                            <button onClick={() => setModalCobro(t)} className={`mt-1 text-[10px] px-3 py-1 rounded-full font-bold border transition ${t.estadoPago === 'Pendiente' ? 'border-amber-500/50 text-amber-500 bg-amber-500/10' : 'border-cyan-500/50 text-cyan-500 bg-cyan-500/10'}`}>
                                                {t.estadoPago.toUpperCase()}
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === "cierre" && (
                        <div className="bg-[#0b1220] rounded-2xl border border-slate-800 overflow-hidden">
                            <table className="w-full text-left text-xs">
                                <thead>
                                    <tr className="bg-[#161f32] text-slate-400 uppercase">
                                        <th className="p-4">Personal</th>
                                        <th className="p-4">Comisiones (50%)</th>
                                        <th className="p-4">Efectivo en Mano</th>
                                        <th className="p-4 text-right">Saldo a Transferir (MP)</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800">
                                    {liquidacionJorge().map((row, i) => (
                                        <tr key={i} className="hover:bg-slate-900/50">
                                            <td className="p-4 font-bold text-slate-300">{row.nombre}</td>
                                            <td className="p-4 text-emerald-400 font-bold">{formatP(row.comisiones)}</td>
                                            <td className="p-4 text-rose-400">{formatP(row.efectivoMano)}</td>
                                            <td className="p-4 text-right font-black text-cyan-400 text-sm">
                                                {formatP(row.comisiones - row.efectivoMano)}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {/* MODAL COBRO DETALLADO */}
                    {modalCobro && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-[#0b1220] w-full max-w-sm rounded-3xl p-6 border border-slate-800">
                                <h3 className="text-xl font-bold mb-1">Rendir Servicio</h3>
                                <p className="text-xs text-slate-500 mb-4">{modalCobro.cliente} - {formatP(modalCobro.precio)}</p>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-500 block mb-1">IMPORTE RECIBIDO</label>
                                        <input type="number" id="inpMonto" className="w-full bg-[#040a14] p-4 rounded-2xl border border-slate-800 text-xl font-black text-emerald-400 outline-none" defaultValue={modalCobro.precio} />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => ejecutarRendicion(document.getElementById('inpMonto').value, 0, 'caja')} className="bg-cyan-600 p-4 rounded-2xl font-bold text-xs">COBRAR TODO</button>
                                        <button onClick={() => ejecutarRendicion(0, 0, 'deuda')} className="bg-slate-800 p-4 rounded-2xl font-bold text-xs text-rose-400">CLIENTE DEBE</button>
                                    </div>
                                    <button onClick={() => setModalCobro(null)} className="w-full text-slate-500 text-xs font-bold pt-2">CANCELAR</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
